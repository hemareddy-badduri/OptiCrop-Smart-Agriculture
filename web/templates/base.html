<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OptiCrop{% endblock %} · Smart Agricultural Production Optimization</title>
  <meta name="description" content="OptiCrop — AI-powered crop recommendation based on soil nutrients and climate parameters.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="nav">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand-logo">🌾</span>
      <span class="brand-name">OptiCrop</span>
    </a>
    <nav class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('about') }}">About</a>
      <a href="{{ url_for('find_your_crop') }}" class="cta">Find Your Crop</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>🌾 OptiCrop · Smart Agricultural Production Optimization Engine</p>
    <p class="muted">Built with Flask &amp; scikit-learn · For educational use.</p>
  </footer>
</body>
</html>
